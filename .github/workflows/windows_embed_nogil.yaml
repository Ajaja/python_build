name: Build CPython Windows x64 Embed NoGIL
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "CPython tag (e.g. v3.14.4)"
        required: true
        default: "v3.14.4"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout CPython
        uses: actions/checkout@v4
        with:
          repository: python/cpython
          ref: ${{ github.event.inputs.tag }}

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Patch buildrelease.bat for free-threaded
        shell: powershell
        run: |
          $f = "Tools\msi\buildrelease.bat"
          (Get-Content $f -Raw) -replace `
            '%MSBUILD% "%D%make_zip.proj" /t:Build %BUILDOPTS% %CERTOPTS% /p:OutputPath="%BUILD%en-us"', `
            '%MSBUILD% "%D%make_zip.proj" /t:Build %BUILDOPTS% %CERTOPTS% /p:OutputPath="%BUILD%en-us" /p:DisableGil="true"' |
          Set-Content $f
          
          $f = "Tools\msi\make_zip.proj"
          (Get-Content $f -Raw) -replace `
            '<Target Name="AfterBuild" />', `
            '<Target Name="BeforeBuild">
          <Copy SourceFiles="$(BuildPath)python$(MajorVersionNumber).$(MinorVersionNumber)t.exe"
                DestinationFiles="$(BuildPath)python.exe" />
          <Copy SourceFiles="$(BuildPath)pythonw$(MajorVersionNumber).$(MinorVersionNumber)t.exe"
                DestinationFiles="$(BuildPath)pythonw.exe" />
          <Copy SourceFiles="$(BuildPath)python$(MajorVersionNumber).$(MinorVersionNumber)t.dll"
                DestinationFiles="$(BuildPath)python.dll" />
          </Target>
          <Target Name="AfterBuild" />' |
          Set-Content $f

          $f = "Tools\msi\make_zip.proj"
          (Get-Content $f -Raw) -replace `
            'DependsOnTargets="_Build;AfterBuild"', `
            'DependsOnTargets="BeforeBuild;_Build;AfterBuild"' |
          Set-Content $f
    
      - name: Build using official release script
        shell: cmd
        env:
          IncludeFreethreaded: "true"
          UseDisableGil: "true"
          DisableGil: "true"
          do_pgo: "true"
        run: |
          Tools\msi\buildrelease.bat -x64 --skip-msi --skip-nuget --skip-doc

      - name: Collect ZIP artifacts
        id: collect
        shell: powershell
        run: |
          $out = "dist"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          $files = Get-ChildItem -Recurse -Include "*-embed-amd64.zip"

          if ($files.Count -eq 0) {
            Write-Error "No ZIP artifacts found"
          }

          foreach ($f in $files) {
            Copy-Item $f.FullName -Destination $out
          }

          echo "dir=$out"
          echo "dir=$out" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ github.event.inputs.tag }}-windows-x64
          path: D:\a\python_build\python_build

name: Build Safetensors cp314t Windows Wheel

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build cp314t-win_amd64
    runs-on: windows-latest

    steps:
      - name: Checkout safetensors repository
        uses: actions/checkout@v4
        with:
          repository: safetensors/safetensors
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        # Run inside the directory containing pyproject.toml
        working-directory: bindings/python
        run: python -m cibuildwheel --output-dir ../../wheelhouse
        env:
          # The specific build identifier for 3.14 free-threaded
          CIBW_BUILD: "cp314t-win_amd64"
          
          # Fixed: Using the valid group name from your error message
          CIBW_ENABLE: "cpython-freethreading"
          
          # On Windows runners, the rust-toolchain action adds cargo to the PATH automatically.
          # We'll leave this empty or remove it to avoid path syntax errors.
          CIBW_ENVIRONMENT: ""
          
          # Optional: Skip tests if they fail due to missing dependencies in the test env
          CIBW_TEST_COMMAND: "python -c \"import safetensors; print('Successfully imported safetensors')\""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safetensors-windows-cp314t
          path: wheelhouse/*.whl

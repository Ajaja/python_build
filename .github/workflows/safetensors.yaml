name: Build Safetensors cp314t Windows Wheel

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build cp314t-win_amd64
    runs-on: windows-latest

    steps:
      - name: Checkout safetensors repository
        uses: actions/checkout@v4
        with:
          repository: safetensors/safetensors
          # Optional: fetch-depth: 0 if you need tags for versioning
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        # We run inside bindings/python because that's where pyproject.toml lives
        working-directory: bindings/python
        run: python -m cibuildwheel --output-dir ../../wheelhouse
        env:
          # Target only the 3.14 free-threaded ABI for Windows 64-bit
          CIBW_BUILD: "cp314t-win_amd64"
          
          # Modern way to enable free-threaded support and pre-releases
          CIBW_ENABLE: "free-threaded-support"
          
          # Ensure the Rust compiler is visible to the build backend (maturin)
          CIBW_ENVIRONMENT: PATH="$PATH:$USERPROFILE\.cargo\bin"
          
          # Skip testing if you want a faster build, 
          # otherwise cibuildwheel will try to install and test the wheel
          CIBW_TEST_COMMAND: "python -c \"import safetensors; print('Success')\""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safetensors-windows-cp314t
          path: wheelhouse/*.whl

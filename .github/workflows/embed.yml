name: Build CPython Windows x64 Embeddable (official pipeline)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "CPython tag (e.g. v3.12.13)"
        required: true
        default: "v3.12.13"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout CPython
        uses: actions/checkout@v4
        with:
          repository: python/cpython
          ref: ${{ github.event.inputs.tag }}

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build using official release script
        shell: cmd
        run: |
          REM Run official release pipeline (PGO + packaging)
          Tools\msi\buildrelease.bat -x64 --skip-msi --skip-nuget --skip-doc

      - name: Locate embeddable package
        id: find_embed
        shell: powershell
        run: |
          $file = Get-ChildItem -Recurse -Filter "*embed-amd64.zip" | Select-Object -First 1
          if (-not $file) {
            Write-Error "Embeddable package not found"
          }
          echo "path=$($file.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ github.event.inputs.tag }}-embed-amd64
          path: ${{ steps.find_embed.outputs.path }}

